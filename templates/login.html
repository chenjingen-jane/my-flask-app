<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:35px;
    width:360px;
    border-radius:18px;
    box-shadow:0 15px 30px rgba(0,0,0,0.18);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#4338ca;
}

p{
    text-align:center;
    margin-top:18px;
}

a{
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
<h1>Login</h1>

{% if message %}
<p style="color:red; text-align:center;">{{ message }}</p>
{% endif %}

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<p>No account? <a href="/register">Register</a></p>
</div>

</body>
</html>
