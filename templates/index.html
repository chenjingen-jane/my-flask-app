<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lifestyle Assistant</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#9face6);
    min-height:100vh;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    margin-bottom:25px;
}

h1,h2,h3{
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

.result{
    background:#f3f4f6;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}

th{
    background:#f9fafb;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logout{
    text-decoration:none;
    color:white;
    background:#ef4444;
    padding:10px 14px;
    border-radius:10px;
}

.logout:hover{
    background:#dc2626;
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <h1>AI Lifestyle Assistant</h1>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="card">
        <h2>Enter Daily Info</h2>

        <form method="POST">
            <input type="text" name="city" placeholder="Enter city" required>
            <input type="number" name="spending" placeholder="Today's spending">
            <input type="text" name="mood" placeholder="Your mood today">
            <button type="submit">Submit</button>
        </form>

        {% if weather %}
        <div class="result">
            <strong>Weather:</strong> {{ weather }}
        </div>
        {% endif %}

        {% if advice %}
        <div class="result">
            <strong>AI Advice:</strong> {{ advice }}
        </div>
        {% endif %}
    </div>

    <div class="card">
        <h2>History</h2>

        <table>
            <tr>
                <th>City</th>
                <th>Spending</th>
            </tr>

            {% for log in logs %}
            <tr>
                <td>{{ log[0] }}</td>
                <td>${{ log[1] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div class="card">
        <h2>Spending Analytics</h2>
        <canvas id="myChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let labels = [];
let data = [];

{% for log in logs %}
labels.push("{{ log[0] }}");
data.push({{ log[1] or 0 }});
{% endfor %}

new Chart(document.getElementById("myChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Spending",
            data: data
        }]
    }
});
</script>

</body>
</html>
